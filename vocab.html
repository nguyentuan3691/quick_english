<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Từ Vựng Tiếng Anh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 16px;
      font-size: 1.6rem;
    }

    /* ===== TABS ===== */
    .tabs-wrapper {
      max-width: 700px;
      margin: 0 auto 20px;
    }

    .tabs-nav {
      display: flex;
      align-items: flex-end;
      position: relative;
    }

    .tabs-scroll-btn {
      flex-shrink: 0;
      width: 30px;
      min-height: 44px;
      background: #e2e8f0;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: #4a5568;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 2;
    }

    .tabs-scroll-btn:first-child { border-radius: 8px 0 0 0; }
    .tabs-scroll-btn:last-child  { border-radius: 0 8px 0 0; }
    .tabs-scroll-btn:hover { background: #cbd5e0; }
    .tabs-scroll-btn:disabled { opacity: 0.3; cursor: default; }

    .tabs-bar {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      border-bottom: 2px solid #cbd5e0;
      overflow-x: auto;
      overflow-y: visible;
      padding-bottom: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab {
      padding: 8px 12px;
      border-radius: 8px 8px 0 0;
      border: 2px solid transparent;
      background: #e2e8f0;
      color: #718096;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 44px;
    }

    .tab:hover { background: #cbd5e0; }

    .tab.active {
      background: white;
      border-color: #cbd5e0 #cbd5e0 white #cbd5e0;
      color: #2d3748;
      font-weight: 600;
      margin-bottom: -2px;
      z-index: 1;
    }

    .tab-name-input {
      border: none;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2d3748;
      width: 80px;
      outline: none;
      cursor: pointer;
    }

    .tab-edit {
      font-size: 0.7rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .tab.active .tab-edit { color: #4299e1; }
    .tab-edit:hover { color: #2b6cb0 !important; }

    .tab-close {
      font-size: 0.75rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      min-width: 22px;
      text-align: center;
    }

    .tab-close:hover { background: #fc8181; color: white; }

    .btn-new-tab {
      padding: 8px 12px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 44px;
    }

    .btn-new-tab:hover { background: #3182ce; }

    /* ===== CONTENT ===== */
    .tab-content {
      background: white;
      border: 2px solid #cbd5e0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 16px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      position: relative;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    .input-area input {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4299e1; }

    .suggest-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 2px solid #4299e1;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 100;
      overflow: hidden;
      display: none;
    }

    .suggest-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f4f8;
    }

    .suggest-item:last-child { border-bottom: none; }

    .suggest-item:hover, .suggest-item.focused {
      background: #ebf8ff;
    }

    .suggest-item .s-word { font-weight: 700; color: #2d3748; }
    .suggest-item .s-word mark {
      background: #bee3f8;
      color: #2b6cb0;
      border-radius: 3px;
      padding: 0 1px;
    }
    .suggest-item .s-meaning { color: #718096; font-size: 0.85rem; font-style: italic; }
    .suggest-item .s-badge {
      margin-left: auto;
      font-size: 0.75rem;
      background: #c6f6d5;
      color: #276749;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .suggest-item .s-badge.new {
      background: #e9d8fd;
      color: #553c9a;
    }

    .suggest-divider {
      font-size: 0.72rem;
      color: #a0aec0;
      padding: 4px 14px;
      background: #f7fafc;
      border-bottom: 1px solid #f0f4f8;
    }

    .btn-add {
      padding: 12px 18px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-add:hover { background: #3182ce; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .count-label { color: #718096; font-size: 0.9rem; }

    .toolbar-right { display: flex; gap: 8px; }

    .btn-speak-all {
      padding: 8px 14px;
      background: #9f7aea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 38px;
    }

    .btn-speak-all:hover { background: #805ad5; }

    .btn-clear-all {
      padding: 8px 12px;
      background: #e2e8f0;
      color: #718096;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 38px;
    }

    .btn-clear-all:hover { background: #cbd5e0; }

    /* ===== VOCAB CARDS ===== */
    .vocab-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .vocab-list::-webkit-scrollbar { width: 5px; }
    .vocab-list::-webkit-scrollbar-track { background: #f0f4f8; border-radius: 4px; }
    .vocab-list::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
    .vocab-list::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

    .vocab-card {
      background: #f7fafc;
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .word-info {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 8px;
      min-width: 0;
    }

    .word-actions {
      display: flex;
      flex-direction: row;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .word-meta { display: none; }

    .word-text {
      font-size: 1rem;
      font-weight: 700;
      color: #2d3748;
    }

    .word-phonetic {
      font-size: 0.8rem;
      color: #4299e1;
    }

    .word-meaning {
      font-size: 0.85rem;
      color: #718096;
      font-style: italic;
      width: 100%;
    }

    .word-meaning.loading { color: #a0aec0; }

    .mic-result {
      font-size: 0.78rem;
      padding: 2px 8px;
      border-radius: 6px;
      display: none;
    }

    .mic-result.correct { background: #c6f6d5; color: #276749; display: inline; }
    .mic-result.wrong   { background: #fed7d7; color: #9b2c2c; display: inline; }
    .mic-result.info    { background: #ebf8ff; color: #2b6cb0; display: inline; }

    .btn-speak, .btn-mic, .btn-delete {
      padding: 7px 10px;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.9rem;
      min-height: 34px;
      min-width: 34px;
    }

    .btn-speak { background: #48bb78; }
    .btn-speak:hover { background: #38a169; }

    .btn-mic { background: #ed8936; }
    .btn-mic:hover { background: #dd6b20; }
    .btn-mic.listening { background: #e53e3e; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .btn-delete { background: #fc8181; }
    .btn-delete:hover { background: #e53e3e; }

    .empty-msg {
      text-align: center;
      color: #a0aec0;
      padding: 30px 0;
      font-size: 0.95rem;
    }

    /* ===== VOICE LOG ===== */
    .voice-log-toggle {
      display: block;
      margin: 8px auto 0;
      padding: 4px 12px;
      background: none;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      color: #a0aec0;
      font-size: 0.72rem;
      cursor: pointer;
    }
    .voice-log-toggle:hover { background: #f7fafc; }
    .voice-log {
      display: none;
      max-height: 120px;
      overflow-y: auto;
      background: #1a202c;
      color: #68d391;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      padding: 8px;
      border-radius: 8px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .voice-log.open { display: block; }
    .voice-log .log-time { color: #718096; }
    .voice-log .log-err { color: #fc8181; }
    .voice-log .log-ok { color: #68d391; }

    /* ===== TOOLTIP ===== */
    #tooltip {
      position: fixed;
      background: #2d3748;
      color: white;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.4;
    }
    #tooltip.visible { opacity: 1; }

    @media (max-width: 480px) {
      body { padding: 10px; }
      h1 { font-size: 1.3rem; margin-bottom: 12px; }
      .tab-content { padding: 12px; }
      .tab-name-input { width: 65px; }
    }
  </style>
</head>
<body>

<div id="tooltip"></div>
<h1>📚 Từ Vựng Tiếng Anh <span style="font-size:0.5em;color:#a0aec0">v1.5</span></h1>

<div class="tabs-wrapper">
  <div class="tabs-nav">
    <button class="tabs-scroll-btn" id="scrollLeft" onclick="scrollTabs(-1)" data-tip="Cuộn tab sang trái">◀</button>
    <div class="tabs-bar" id="tabsBar"></div>
    <button class="tabs-scroll-btn" id="scrollRight" onclick="scrollTabs(1)" data-tip="Cuộn tab sang phải">▶</button>
    <button class="btn-new-tab" onclick="newTab()" data-tip="Tạo bài học mới">+</button>
  </div>
  <div class="tab-content">
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="wordInput" placeholder="Nhập hoặc tìm từ tiếng Anh..." autofocus autocomplete="off" />
        <div class="suggest-list" id="suggestList"></div>
      </div>
      <button class="btn-add" onclick="addWord()" data-tip="Thêm từ vào danh sách (Enter)">+ Thêm</button>
    </div>
    <div class="toolbar">
      <span class="count-label" id="countLabel">0 từ</span>
      <div class="toolbar-right">
        <button class="btn-speak-all" onclick="speakAll()" data-tip="Đọc lần lượt tất cả từ trong bài">▶ Đọc tất cả</button>
        <button class="btn-clear-all" onclick="clearAll()" data-tip="Xóa toàn bộ từ trong bài này">Xóa tất cả</button>
      </div>
    </div>
    <div class="vocab-list" id="vocabList"></div>
    <p class="empty-msg" id="emptyMsg">Chưa có từ nào. Thêm từ đầu tiên nhé! 👆</p>
    <div style="display:flex;gap:6px;justify-content:center;margin-top:8px">
      <button class="voice-log-toggle" onclick="toggleVoiceLog()">🔍 Voice Log</button>
      <button class="voice-log-toggle" onclick="clearVoiceLog()">🗑 Xóa log</button>
    </div>
    <div class="voice-log" id="voiceLog"></div>
  </div>
</div>

<script>
  // ===== DỮ LIỆU =====
  let tabs = JSON.parse(localStorage.getItem('vocab_tabs') || 'null');
  if (!tabs) {
    tabs = [{ id: 'tab_' + Date.now(), name: 'Bài 1' }];
    saveTabs();
  }
  let activeTabId = localStorage.getItem('vocab_active_tab') || tabs[0].id;
  if (!tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;

  function saveTabs() {
    localStorage.setItem('vocab_tabs', JSON.stringify(tabs));
  }

  function getWords(tabId) {
    return JSON.parse(localStorage.getItem('vocab_words_' + tabId) || '[]');
  }

  function setWords(tabId, words) {
    localStorage.setItem('vocab_words_' + tabId, JSON.stringify(words));
  }

  // ===== RENDER TABS =====
  function renderTabs() {
    const bar = document.getElementById('tabsBar');
    bar.innerHTML = '';

    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
      el.onclick = (e) => {
        if (e.target.classList.contains('tab-close')) return;
        if (e.target.classList.contains('tab-name-input') && !e.target.readOnly) return;
        switchTab(tab.id);
      };

      const nameInput = document.createElement('input');
      nameInput.className = 'tab-name-input';
      nameInput.value = tab.name;
      nameInput.readOnly = true;

      function startEdit() {
        nameInput.readOnly = false;
        nameInput.focus();
        nameInput.select();
      }

      nameInput.onblur = () => {
        nameInput.readOnly = true;
        tab.name = nameInput.value.trim() || tab.name;
        nameInput.value = tab.name;
        saveTabs();
        renderTabs();
      };
      nameInput.onkeydown = (e) => {
        if (e.key === 'Enter') nameInput.blur();
        e.stopPropagation();
      };

      const editBtn = document.createElement('span');
      editBtn.className = 'tab-edit';
      editBtn.textContent = '✏';
      editBtn.title = 'Đổi tên';
      editBtn.onclick = (e) => {
        e.stopPropagation();
        if (tab.id !== activeTabId) { switchTab(tab.id); setTimeout(startEdit, 60); return; }
        startEdit();
      };

      const closeBtn = document.createElement('span');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '✕';
      closeBtn.title = 'Xóa tab';
      closeBtn.onclick = () => deleteTab(tab.id);

      el.appendChild(nameInput);
      el.appendChild(editBtn);
      if (tabs.length > 1) el.appendChild(closeBtn);
      bar.appendChild(el);
    });

  }

  function switchTab(id) {
    activeTabId = id;
    localStorage.setItem('vocab_active_tab', id);
    renderTabs();
    renderWords();
    document.getElementById('wordInput').focus();
    setTimeout(() => { updateScrollBtns(); scrollActiveTabIntoView(); }, 50);
  }

  function newTab() {
    const id = 'tab_' + Date.now();
    tabs.push({ id, name: 'Bài ' + (tabs.length + 1) });
    saveTabs();
    switchTab(id);
  }

  function deleteTab(id) {
    if (!confirm('Xóa tab "' + tabs.find(t => t.id === id)?.name + '"?')) return;
    localStorage.removeItem('vocab_words_' + id);
    tabs = tabs.filter(t => t.id !== id);
    saveTabs();
    if (activeTabId === id) activeTabId = tabs[0].id;
    switchTab(activeTabId);
  }

  // ===== RENDER WORDS =====
  function renderWords() {
    const words = getWords(activeTabId);
    const list = document.getElementById('vocabList');
    const emptyMsg = document.getElementById('emptyMsg');
    const countLabel = document.getElementById('countLabel');

    list.innerHTML = '';
    countLabel.textContent = words.length + ' từ';

    if (words.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    for (const word of words) {
      const card = document.createElement('div');
      card.className = 'vocab-card';

      card.innerHTML = `
        <div class="word-info">
          <span class="word-text">${word}</span>
          <span class="word-phonetic" id="ph-${word}">...</span>
          <span class="word-meaning loading" id="mn-${word}">đang dịch...</span>
          <span class="mic-result" id="mr-${word}"></span>
        </div>
        <div class="word-actions">
          <button class="btn-speak" data-tip="Nghe Google đọc từ này">🔊</button>
          <button class="btn-mic" id="mb-${word}" onclick="startListen('${word}')" data-tip="Nhấn → nói từ → tự dừng khi bạn ngừng nói">🎤</button>
          <button class="btn-delete" onclick="deleteWord('${word}')" data-tip="Xóa từ này khỏi danh sách">✕</button>
        </div>
      `;

      // iOS: nút loa chính là <audio> element, user tap trực tiếp → play() hợp lệ
      const au = document.createElement('audio');
      au.preload = 'none';
      au.src = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=en&client=gtx`;
      au.dataset.word = word;
      card.querySelector('.word-actions').prepend(au);

      au.addEventListener('playing', () => vlog(`🔊 Audio playing: "${au.dataset.word}"`));
      au.addEventListener('error', () => vlog(`🔊 Audio error: "${au.dataset.word}" — ${au.error?.message || au.error?.code || 'unknown'}`, 'err'));
      au.addEventListener('ended', () => vlog(`🔊 Audio ended: "${au.dataset.word}"`));

      const speakBtn = card.querySelector('.btn-speak');
      speakBtn.addEventListener('click', () => {
        vlog(`🔊 Tap speak: "${word}"`);
        // Unlock shared audio trên iOS bằng cách play silent rồi dùng cho speakAll
        _sharedAudio.play().then(() => _sharedAudio.pause()).catch(() => {});
        au.currentTime = 0;
        au.play().catch(err => vlog(`🔊 play() rejected: ${err.message}`, 'err'));
      });

      list.appendChild(card);

      translate(word).then(m => {
        const el = document.getElementById('mn-' + word);
        if (el) { el.textContent = m; el.className = 'word-meaning'; }
      });
      getPhonetic(word).then(p => {
        const el = document.getElementById('ph-' + word);
        if (el) el.textContent = p || '';
      });
    }
  }

  // ===== ACTIONS =====
  function addWord() {
    const input = document.getElementById('wordInput');
    const word = input.value.trim();
    if (!word) return;
    const words = getWords(activeTabId);
    if (words.map(w => w.toLowerCase()).includes(word.toLowerCase())) {
      input.value = '';
      return;
    }
    words.push(word);
    setWords(activeTabId, words);
    input.value = '';
    renderWords();
    speak(word);
  }

  function deleteWord(word) {
    const words = getWords(activeTabId).filter(w => w !== word);
    setWords(activeTabId, words);
    renderWords();
  }

  function clearAll() {
    if (!confirm('Xóa hết từ vựng trong tab này?')) return;
    setWords(activeTabId, []);
    renderWords();
  }

  // ===== API =====
  async function translate(word) {
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(word)}`;
      const res = await fetch(url);
      const data = await res.json();
      return data[0].map(x => x[0]).join('');
    } catch { return ''; }
  }

  async function getPhonetic(word) {
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      const data = await res.json();
      return data[0]?.phonetic || data[0]?.phonetics?.find(p => p.text)?.text || '';
    } catch { return ''; }
  }

  // Shared audio — dùng cho speak(word) gọi programmatic & speakAll()
  // Trên iOS, sau khi user tap unlock 1 lần, element này có thể play() tự do
  const _sharedAudio = document.createElement('audio');
  _sharedAudio.preload = 'none';
  document.body.appendChild(_sharedAudio);

  function speak(word) {
    const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=en&client=gtx`;
    _sharedAudio.src = url;
    _sharedAudio.play().catch(() => {});
  }

  function speakAll() {
    const words = getWords(activeTabId);
    if (!words.length) return;
    vlog(`▶▶ speakAll: ${words.length} từ`);
    let i = 0;
    function next() {
      if (i >= words.length) { vlog(`▶▶ speakAll hoàn tất`, 'ok'); return; }
      vlog(`▶▶ speakAll [${i+1}/${words.length}]: "${words[i]}"`);
      const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(words[i])}&tl=en&client=gtx`;
      _sharedAudio.onended = () => { i++; setTimeout(next, 500); };
      _sharedAudio.onerror = () => { vlog(`▶▶ speakAll error tại "${words[i]}"`, 'err'); i++; setTimeout(next, 500); };
      _sharedAudio.src = url;
      _sharedAudio.play().catch(err => vlog(`▶▶ speakAll play() rejected: ${err.message}`, 'err'));
    }
    // Từ đầu tiên play() trong user gesture → unlock
    // Các từ tiếp theo dùng cùng element đã unlock → iOS cho phép
    next();
  }

  // ===== VOICE LOG =====
  function vlog(msg, type) {
    const log = document.getElementById('voiceLog');
    const now = new Date();
    const t = now.toLocaleTimeString('vi', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const ms = String(now.getMilliseconds()).padStart(3,'0');
    const cls = type === 'err' ? 'log-err' : type === 'ok' ? 'log-ok' : '';
    log.innerHTML += `<div><span class="log-time">[${t}.${ms}]</span> <span class="${cls}">${msg}</span></div>`;
    log.scrollTop = log.scrollHeight;
  }
  function toggleVoiceLog() {
    const el = document.getElementById('voiceLog');
    const wasOpen = el.classList.toggle('open');
    if (wasOpen && el.children.length === 0) {
      vlog(`📱 UA: ${navigator.userAgent}`);
      vlog(`🔈 SpeechRecognition: ${SpeechRecognition ? 'YES' : 'NO'}`);
    }
  }
  function clearVoiceLog() {
    document.getElementById('voiceLog').innerHTML = '';
  }

  // ===== SPEECH RECOGNITION =====
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let _activeRec = null;
  let _activeRecWord = null;

  function startListen(word) {
    if (!SpeechRecognition) {
      alert('Trình duyệt không hỗ trợ nhận diện giọng nói.');
      return;
    }

    // Nếu đang ghi âm cùng từ → dừng
    if (_activeRec && _activeRecWord === word) {
      _activeRec.stop();
      return;
    }

    // Nếu đang ghi âm từ khác → dừng cái cũ trước
    if (_activeRec) {
      _activeRec.onend = null;
      _activeRec.onerror = null;
      _activeRec.onresult = null;
      _activeRec.abort();
      const oldBtn = document.getElementById('mb-' + _activeRecWord);
      if (oldBtn) { oldBtn.classList.remove('listening'); oldBtn.textContent = '🎤'; }
      _activeRec = null;
      _activeRecWord = null;
    }

    const btn = document.getElementById('mb-' + word);
    const result = document.getElementById('mr-' + word);

    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 5;

    _activeRec = rec;
    _activeRecWord = word;

    btn.classList.add('listening');
    btn.textContent = '⏹';
    result.className = 'mic-result info';
    result.textContent = '🎙 Hãy nói "' + word + '" — tự dừng khi bạn ngừng nói';
    vlog(`▶ Bắt đầu nghe "${word}" (lang=${rec.lang}, maxAlt=${rec.maxAlternatives})`);

    rec.onaudiostart = () => vlog(`🎙 audiostart — mic đã mở`);
    rec.onsoundstart = () => vlog(`🎙 soundstart — phát hiện âm thanh`);
    rec.onspeechstart = () => vlog(`🎙 speechstart — phát hiện giọng nói`);
    rec.onspeechend = () => vlog(`🎙 speechend — ngừng nói`);
    rec.onsoundend = () => vlog(`🎙 soundend — hết âm thanh`);
    rec.onaudioend = () => vlog(`🎙 audioend — mic đã đóng`);
    rec.onnomatch = () => vlog(`🎙 nomatch — không khớp kết quả nào`, 'err');

    rec.onresult = (e) => {
      const res0 = e.results[0];
      const isFinal = res0.isFinal;
      const alts = Array.from(res0).map(r => ({ text: r.transcript.trim().toLowerCase(), conf: r.confidence }));
      const matched = alts.some(a => a.text === word.toLowerCase());
      result.className = 'mic-result ' + (matched ? 'correct' : 'wrong');
      result.textContent = matched ? `✓ Chính xác! Google nhận ra: "${alts[0].text}"` : `✗ Chưa đúng — Google nghe: "${alts[0].text}"`;
      const altStr = alts.map(a => `"${a.text}" (${(a.conf*100).toFixed(1)}%)`).join(', ');
      vlog(`📝 result (final=${isFinal}): [${altStr}] → ${matched ? 'ĐÚNG ✓' : 'SAI ✗'}`, matched ? 'ok' : 'err');
    };

    rec.onerror = (e) => {
      vlog(`❌ Lỗi: ${e.error} | message: ${e.message || '(none)'}`, 'err');
      if (e.error === 'aborted') return;
      result.className = 'mic-result wrong';
      result.textContent = e.error === 'no-speech' ? '🔇 Không nghe thấy gì — hãy thử lại' : 'Lỗi: ' + e.error;
    };

    rec.onend = () => {
      vlog(`⏹ Kết thúc nghe "${word}"`);
      btn.classList.remove('listening');
      btn.textContent = '🎤';
      if (_activeRec === rec) {
        _activeRec = null;
        _activeRecWord = null;
      }
    };

    try {
      rec.start();
      vlog(`🎙 rec.start() called OK`);
    } catch(err) {
      vlog(`🎙 rec.start() exception: ${err.message}`, 'err');
    }
  }

  // ===== SCROLL TABS =====
  function scrollTabs(dir) {
    const bar = document.getElementById('tabsBar');
    bar.scrollBy({ left: dir * 160, behavior: 'smooth' });
  }

  function updateScrollBtns() {
    const bar = document.getElementById('tabsBar');
    const btnL = document.getElementById('scrollLeft');
    const btnR = document.getElementById('scrollRight');
    const hasOverflow = bar.scrollWidth > bar.clientWidth;
    btnL.style.display = hasOverflow ? '' : 'none';
    btnR.style.display = hasOverflow ? '' : 'none';
    btnL.disabled = bar.scrollLeft <= 0;
    btnR.disabled = bar.scrollLeft + bar.clientWidth >= bar.scrollWidth - 1;
  }

  function scrollActiveTabIntoView() {
    const bar = document.getElementById('tabsBar');
    const active = bar.querySelector('.tab.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    setTimeout(updateScrollBtns, 300);
  }

  // ===== TÌM KIẾM / SUGGEST =====
  let focusedSuggest = -1;

  function highlight(text, query) {
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return `<span>${text}</span>`;
    return `<span>${text.slice(0, idx)}<mark>${text.slice(idx, idx + query.length)}</mark>${text.slice(idx + query.length)}</span>`;
  }

  let suggestTimer = null;

  async function renderSuggest(query) {
    const box = document.getElementById('suggestList');
    focusedSuggest = -1;
    if (!query) { box.style.display = 'none'; return; }

    const existing = getWords(activeTabId);
    const existMatches = existing.filter(w => w.toLowerCase().includes(query.toLowerCase()));

    // Hiện ngay phần từ đã có
    let html = '';
    if (existMatches.length) {
      html += existMatches.slice(0, 4).map(w => {
        const meaning = localStorage.getItem('meaning_' + w) || '';
        return `<div class="suggest-item" data-word="${w}" onmousedown="selectSuggest('${w}')">
          <span class="s-word">${highlight(w, query)}</span>
          ${meaning ? `<span class="s-meaning">${meaning}</span>` : ''}
          <span class="s-badge">Đã có ↑</span>
        </div>`;
      }).join('');
    }

    box.innerHTML = html || '<div class="suggest-divider">Đang tìm gợi ý...</div>';
    box.style.display = 'block';

    // Debounce gợi ý từ mới
    clearTimeout(suggestTimer);
    suggestTimer = setTimeout(async () => {
      try {
        const res = await fetch(`https://api.datamuse.com/words?sp=${encodeURIComponent(query)}*&max=6`);
        const data = await res.json();
        const existSet = new Set(existing.map(w => w.toLowerCase()));
        const newWords = data.map(d => d.word).filter(w => !existSet.has(w.toLowerCase()));

        let newHtml = existMatches.length
          ? existMatches.slice(0, 4).map(w => {
              const meaning = localStorage.getItem('meaning_' + w) || '';
              return `<div class="suggest-item" data-word="${w}" onmousedown="selectSuggest('${w}')">
                <span class="s-word">${highlight(w, query)}</span>
                ${meaning ? `<span class="s-meaning">${meaning}</span>` : ''}
                <span class="s-badge">Đã có ↑</span>
              </div>`;
            }).join('')
          : '';

        if (newWords.length) {
          newHtml += `<div class="suggest-divider">Gợi ý từ mới</div>`;
          newHtml += newWords.slice(0, 4).map(w =>
            `<div class="suggest-item" data-word="${w}" onmousedown="selectSuggest('${w}', true)">
              <span class="s-word">${highlight(w, query)}</span>
              <span class="s-badge new">+ Thêm</span>
            </div>`
          ).join('');
        }

        if (newHtml) {
          box.innerHTML = newHtml;
          box.style.display = 'block';
        } else {
          box.style.display = 'none';
        }
      } catch {
        if (!existMatches.length) box.style.display = 'none';
      }
    }, 300);
  }

  function selectSuggest(word, isNew = false) {
    const words = getWords(activeTabId).filter(w => w !== word);
    if (isNew) {
      words.unshift(word); // thêm từ mới vào đầu
    } else {
      words.unshift(word); // đẩy từ đã có lên đầu
    }
    setWords(activeTabId, words);
    document.getElementById('wordInput').value = '';
    document.getElementById('suggestList').style.display = 'none';
    renderWords();
    speak(word);
    setTimeout(() => { document.getElementById('vocabList').scrollTop = 0; }, 50);
  }

  function closeSuggest() {
    document.getElementById('suggestList').style.display = 'none';
    focusedSuggest = -1;
  }

  // Cache meaning để hiện trong suggest
  const origTranslate = translate;
  translate = async (word) => {
    const result = await origTranslate(word);
    if (result) localStorage.setItem('meaning_' + word, result);
    return result;
  };

  // ===== KHỞI TẠO =====
  const wordInput = document.getElementById('wordInput');

  wordInput.addEventListener('input', () => {
    renderSuggest(wordInput.value.trim());
  });

  wordInput.addEventListener('keydown', e => {
    const box = document.getElementById('suggestList');
    const items = box.querySelectorAll('.suggest-item');

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedSuggest = Math.min(focusedSuggest + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusedSuggest));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedSuggest = Math.max(focusedSuggest - 1, -1);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusedSuggest));
    } else if (e.key === 'Enter') {
      if (focusedSuggest >= 0 && items[focusedSuggest]) {
        selectSuggest(items[focusedSuggest].dataset.word);
      } else {
        closeSuggest();
        addWord();
      }
    } else if (e.key === 'Escape') {
      closeSuggest();
    }
  });

  wordInput.addEventListener('blur', () => setTimeout(closeSuggest, 150));

  // ===== TOOLTIP (fixed-position, không bị clip bởi overflow) =====
  const _tip = document.getElementById('tooltip');
  let _tipTimer = null;

  function showTip(el) {
    const text = el.getAttribute('data-tip');
    if (!text) return;
    _tip.textContent = text;
    const r = el.getBoundingClientRect();
    _tip.style.left = '-9999px';
    _tip.style.top = '-9999px';
    _tip.classList.add('visible');
    const tw = _tip.offsetWidth;
    const th = _tip.offsetHeight;
    let x = r.left + r.width / 2 - tw / 2;
    let y = r.top - th - 8;
    if (y < 4) y = r.bottom + 8; // flip xuống nếu không đủ chỗ
    x = Math.max(4, Math.min(x, window.innerWidth - tw - 4));
    _tip.style.left = x + 'px';
    _tip.style.top = y + 'px';
  }

  function hideTip() {
    _tip.classList.remove('visible');
  }

  // Desktop: hover
  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest('[data-tip]');
    if (el) showTip(el); else hideTip();
  });
  document.addEventListener('mouseout', (e) => {
    if (!e.relatedTarget?.closest('[data-tip]')) hideTip();
  });

  // Mobile: tap
  document.addEventListener('touchstart', (e) => {
    const el = e.target.closest('[data-tip]');
    hideTip();
    clearTimeout(_tipTimer);
    if (el) {
      showTip(el);
      _tipTimer = setTimeout(hideTip, 2000);
    }
  }, { passive: true });

  document.getElementById('tabsBar').addEventListener('scroll', updateScrollBtns);
  window.addEventListener('resize', updateScrollBtns);

  renderTabs();
  renderWords();
  setTimeout(() => { updateScrollBtns(); scrollActiveTabIntoView(); }, 50);
</script>

</body>
</html>
