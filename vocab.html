<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Từ Vựng Tiếng Anh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 16px;
      font-size: 1.6rem;
    }

    /* ===== TABS ===== */
    .tabs-wrapper {
      max-width: 700px;
      margin: 0 auto 20px;
    }

    .tabs-nav {
      display: flex;
      align-items: flex-end;
      position: relative;
    }

    .tabs-scroll-btn {
      flex-shrink: 0;
      width: 30px;
      min-height: 44px;
      background: #e2e8f0;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: #4a5568;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 2;
    }

    .tabs-scroll-btn:first-child { border-radius: 8px 0 0 0; }
    .tabs-scroll-btn:last-child  { border-radius: 0 8px 0 0; }
    .tabs-scroll-btn:hover { background: #cbd5e0; }
    .tabs-scroll-btn:disabled { opacity: 0.3; cursor: default; }

    .tabs-bar {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      border-bottom: 2px solid #cbd5e0;
      overflow-x: auto;
      overflow-y: visible;
      padding-bottom: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab {
      padding: 8px 12px;
      border-radius: 8px 8px 0 0;
      border: 2px solid transparent;
      background: #e2e8f0;
      color: #718096;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 44px;
    }

    .tab:hover { background: #cbd5e0; }

    .tab.active {
      background: white;
      border-color: #cbd5e0 #cbd5e0 white #cbd5e0;
      color: #2d3748;
      font-weight: 600;
      margin-bottom: -2px;
      z-index: 1;
    }

    .tab-name-input {
      border: none;
      background: transparent;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2d3748;
      width: 80px;
      outline: none;
      cursor: pointer;
    }

    .tab-edit {
      font-size: 0.7rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .tab.active .tab-edit { color: #4299e1; }
    .tab-edit:hover { color: #2b6cb0 !important; }

    .tab-close {
      font-size: 0.75rem;
      color: #a0aec0;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      min-width: 22px;
      text-align: center;
    }

    .tab-close:hover { background: #fc8181; color: white; }

    .btn-new-tab {
      padding: 8px 12px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 44px;
    }

    .btn-new-tab:hover { background: #3182ce; }

    /* ===== CONTENT ===== */
    .tab-content {
      background: white;
      border: 2px solid #cbd5e0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 16px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      position: relative;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    .input-area input {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4299e1; }

    .suggest-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 2px solid #4299e1;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 100;
      overflow: hidden;
      display: none;
    }

    .suggest-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f4f8;
    }

    .suggest-item:last-child { border-bottom: none; }

    .suggest-item:hover, .suggest-item.focused {
      background: #ebf8ff;
    }

    .suggest-item .s-word { font-weight: 700; color: #2d3748; }
    .suggest-item .s-word mark {
      background: #bee3f8;
      color: #2b6cb0;
      border-radius: 3px;
      padding: 0 1px;
    }
    .suggest-item .s-meaning { color: #718096; font-size: 0.85rem; font-style: italic; }
    .suggest-item .s-badge {
      margin-left: auto;
      font-size: 0.75rem;
      background: #c6f6d5;
      color: #276749;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .suggest-item .s-badge.new {
      background: #e9d8fd;
      color: #553c9a;
    }

    .suggest-divider {
      font-size: 0.72rem;
      color: #a0aec0;
      padding: 4px 14px;
      background: #f7fafc;
      border-bottom: 1px solid #f0f4f8;
    }

    .btn-add {
      padding: 12px 18px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-add:hover { background: #3182ce; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .count-label { color: #718096; font-size: 0.9rem; }

    .toolbar-right { display: flex; gap: 8px; }

    .btn-speak-all {
      padding: 8px 14px;
      background: #9f7aea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 38px;
    }

    .btn-speak-all:hover { background: #805ad5; }

    .btn-quiz {
      padding: 8px 14px;
      background: #ed8936;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 38px;
    }
    .btn-quiz:hover { background: #dd6b20; }

    .btn-match {
      padding: 8px 14px;
      background: #38b2ac;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 38px;
    }
    .btn-match:hover { background: #319795; }

    .btn-clear-all {
      padding: 8px 12px;
      background: #e2e8f0;
      color: #718096;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 38px;
    }

    .btn-clear-all:hover { background: #cbd5e0; }

    /* ===== VOCAB CARDS ===== */
    .vocab-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 4px;
    }

    .vocab-list::-webkit-scrollbar { width: 5px; }
    .vocab-list::-webkit-scrollbar-track { background: #f0f4f8; border-radius: 4px; }
    .vocab-list::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
    .vocab-list::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

    .vocab-card {
      background: #f7fafc;
      border-radius: 12px;
      padding: 16px 20px;
      border: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .vocab-card:hover { background: #ebf8ff; box-shadow: 0 2px 8px rgba(66,153,225,0.12); }

    .word-img {
      width: 88px;
      height: 88px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #e2e8f0;
      display: none;
    }
    .word-img.loaded { display: block; }

    .word-info {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 12px;
      min-width: 0;
    }

    .word-actions {
      display: flex;
      flex-direction: row;
      gap: 5px;
      align-items: center;
      flex-shrink: 0;
    }

    .word-meta { display: none; }

    .word-text {
      font-size: 1.6rem;
      font-weight: 700;
      color: #2d3748;
    }

    .word-phonetic {
      font-size: 1.1rem;
      color: #4299e1;
    }

    .word-meaning {
      font-size: 1.2rem;
      color: #718096;
      font-style: italic;
      width: 100%;
    }

    .word-meaning.loading { color: #a0aec0; }

    .mic-result {
      font-size: 1rem;
      padding: 4px 12px;
      border-radius: 8px;
      display: none;
    }

    .mic-result.correct { background: #c6f6d5; color: #276749; display: inline; }
    .mic-result.wrong   { background: #fed7d7; color: #9b2c2c; display: inline; }
    .mic-result.info    { background: #ebf8ff; color: #2b6cb0; display: inline; }

    .btn-speak, .btn-mic, .btn-delete {
      padding: 6px 8px;
      color: white;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.85rem;
      min-height: 28px;
      min-width: 28px;
    }

    .btn-speak { background: #48bb78; }
    .btn-speak:hover { background: #38a169; }

    .btn-mic { background: #ed8936; }
    .btn-mic:hover { background: #dd6b20; }
    .btn-mic.listening { background: #e53e3e; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .btn-delete { background: #fc8181; }
    .btn-delete:hover { background: #e53e3e; }

    .empty-msg {
      text-align: center;
      color: #a0aec0;
      padding: 30px 0;
      font-size: 0.95rem;
    }

    /* ===== VOICE LOG ===== */
    .voice-log-toggle {
      display: block;
      margin: 8px auto 0;
      padding: 4px 12px;
      background: none;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      color: #a0aec0;
      font-size: 0.72rem;
      cursor: pointer;
    }
    .voice-log-toggle:hover { background: #f7fafc; }
    .voice-log {
      display: none;
      max-height: 120px;
      overflow-y: auto;
      background: #1a202c;
      color: #68d391;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      padding: 8px;
      border-radius: 8px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .voice-log.open { display: block; }
    .voice-log .log-time { color: #718096; }
    .voice-log .log-err { color: #fc8181; }
    .voice-log .log-ok { color: #68d391; }

    /* ===== MIC LEVEL METER ===== */
    .mic-meter-wrap {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 4px 8px;
      background: #1a202c;
      border-radius: 6px;
      font-size: 0.7rem;
      color: #a0aec0;
      font-family: 'Courier New', monospace;
    }
    .mic-meter-wrap.active { display: flex; }
    .mic-meter-bar {
      flex: 1;
      height: 10px;
      background: #2d3748;
      border-radius: 4px;
      overflow: hidden;
    }
    .mic-meter-fill {
      height: 100%;
      width: 0%;
      background: #68d391;
      border-radius: 4px;
      transition: width 0.05s;
    }
    .mic-meter-fill.low { background: #fc8181; }
    .mic-meter-fill.mid { background: #ed8936; }
    .mic-meter-fill.high { background: #68d391; }
    .mic-meter-val { min-width: 32px; text-align: right; }

    /* ===== FLASHCARD ===== */
    .fc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .fc-overlay.open { display: flex; }
    .fc-box {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .fc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #4299e1;
      color: white;
    }
    .fc-header-title { font-weight: 700; font-size: 1rem; }
    .fc-header-info { font-size: 0.8rem; opacity: 0.9; }
    .fc-close {
      background: none; border: none; color: white;
      font-size: 1.3rem; cursor: pointer; padding: 4px 8px;
      border-radius: 6px;
    }
    .fc-close:hover { background: rgba(255,255,255,0.2); }
    .fc-mode-bar {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      background: #ebf8ff;
    }
    .fc-mode-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid #bee3f8;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #4a5568;
      text-align: center;
      transition: all 0.15s;
    }
    .fc-mode-btn.active {
      border-color: #4299e1;
      background: #4299e1;
      color: white;
      font-weight: 600;
    }
    .fc-mode-btn:hover:not(.active) { border-color: #90cdf4; }
    .fc-card {
      padding: 24px 16px;
      text-align: center;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }
    .fc-prompt {
      font-size: 0.8rem;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .fc-question {
      font-size: 1.5rem;
      font-weight: 700;
      color: #2d3748;
      line-height: 1.4;
    }
    .fc-question.vi { font-style: italic; color: #718096; font-size: 1.3rem; }
    .fc-img {
      width: 120px;
      height: 90px;
      border-radius: 10px;
      object-fit: cover;
      margin: 0 auto;
      background: #e2e8f0;
      display: none;
    }
    .fc-img.loaded { display: block; }
    .fc-phonetic { font-size: 0.9rem; color: #4299e1; }
    .fc-answer-area {
      padding: 0 16px 16px;
      display: flex;
      gap: 8px;
    }
    .fc-input {
      flex: 1;
      padding: 12px 14px;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 10px;
      outline: none;
      text-align: center;
    }
    .fc-input:focus { border-color: #4299e1; }
    .fc-input.correct { border-color: #48bb78; background: #f0fff4; }
    .fc-input.wrong { border-color: #fc8181; background: #fff5f5; }
    .fc-mic-btn {
      padding: 12px 14px;
      background: #ed8936;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      min-width: 44px;
    }
    .fc-mic-btn:hover { background: #dd6b20; }
    .fc-mic-btn.listening { background: #e53e3e; animation: pulse 1s infinite; }
    .fc-check-btn {
      padding: 12px 18px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    .fc-check-btn:hover { background: #3182ce; }
    .fc-reveal {
      padding: 12px 16px;
      text-align: center;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
      display: none;
    }
    .fc-reveal.show { display: block; }
    .fc-reveal-word {
      font-size: 1.4rem;
      font-weight: 700;
      color: #2d3748;
    }
    .fc-reveal-meaning {
      font-size: 0.95rem;
      color: #718096;
      font-style: italic;
      margin-top: 4px;
    }
    .fc-reveal-phonetic {
      font-size: 0.85rem;
      color: #4299e1;
      margin-top: 2px;
    }
    .fc-actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #f7fafc;
      border-top: 1px solid #e2e8f0;
    }
    .fc-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      min-height: 42px;
    }
    .fc-btn-audio { background: #48bb78; color: white; }
    .fc-btn-audio:hover { background: #38a169; }
    .fc-btn-next { background: #4299e1; color: white; }
    .fc-btn-next:hover { background: #3182ce; }
    .fc-score {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #718096;
      border-top: 1px solid #e2e8f0;
    }
    .fc-score-ok { color: #276749; font-weight: 600; }
    .fc-score-fail { color: #9b2c2c; font-weight: 600; }
    .fc-done {
      padding: 32px 16px;
      text-align: center;
    }
    .fc-done h2 { font-size: 1.3rem; color: #2d3748; margin-bottom: 8px; }
    .fc-done p { color: #718096; margin-bottom: 16px; }
    .fc-done-btn {
      padding: 10px 24px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
    }
    .fc-done-btn:hover { background: #3182ce; }
    .fc-done-btn.secondary { background: #e2e8f0; color: #4a5568; }
    .fc-done-btn.secondary:hover { background: #cbd5e0; }

    /* ===== WORD DETAIL POPUP ===== */
    .wd-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      justify-content: center;
      align-items: flex-end;
      padding: 0;
    }
    @media (min-width: 480px) {
      .wd-overlay { align-items: center; padding: 16px; }
    }
    .wd-overlay.open { display: flex; }
    .wd-box {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.2);
      overflow: hidden;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    }
    @media (min-width: 480px) {
      .wd-box { border-radius: 20px; transform: scale(0.9); transition: transform 0.22s cubic-bezier(.4,0,.2,1), opacity 0.22s; opacity: 0; }
    }
    .wd-overlay.open .wd-box { transform: translateY(0); }
    @media (min-width: 480px) {
      .wd-overlay.open .wd-box { transform: scale(1); opacity: 1; }
    }
    .wd-drag-bar {
      width: 40px; height: 4px;
      background: #cbd5e0;
      border-radius: 2px;
      margin: 10px auto 0;
    }
    @media (min-width: 480px) { .wd-drag-bar { display: none; } }
    .wd-header {
      display: flex;
      justify-content: flex-end;
      padding: 8px 12px 0;
    }
    .wd-close {
      background: #e2e8f0; border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: #4a5568;
    }
    .wd-close:hover { background: #cbd5e0; }
    .wd-img-wrap {
      display: flex;
      justify-content: center;
      padding: 0 20px 4px;
    }
    .wd-img {
      width: 140px; height: 105px;
      border-radius: 14px;
      object-fit: cover;
      background: #e2e8f0;
      display: none;
    }
    .wd-img.loaded { display: block; }
    .wd-body {
      padding: 8px 24px 20px;
      text-align: center;
    }
    .wd-word {
      font-size: 2.4rem;
      font-weight: 800;
      color: #2d3748;
      line-height: 1.2;
    }
    .wd-phonetic {
      font-size: 1.2rem;
      color: #4299e1;
      margin: 4px 0 10px;
    }
    .wd-meaning {
      font-size: 1.3rem;
      color: #718096;
      font-style: italic;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .wd-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .wd-btn-speak {
      flex: 1;
      max-width: 160px;
      padding: 14px;
      background: #48bb78;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 600;
      min-height: 52px;
    }
    .wd-btn-speak:hover { background: #38a169; }
    .wd-btn-mic {
      flex: 1;
      max-width: 160px;
      padding: 14px;
      background: #ed8936;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: 600;
      min-height: 52px;
    }
    .wd-btn-mic:hover { background: #dd6b20; }
    .wd-btn-mic.listening { background: #e53e3e; animation: pulse 1s infinite; }
    .wd-mic-result {
      font-size: 1rem;
      padding: 6px 14px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
    }
    .wd-mic-result.correct { background: #c6f6d5; color: #276749; display: block; }
    .wd-mic-result.wrong   { background: #fed7d7; color: #9b2c2c; display: block; }

    /* ===== WORD MATCH ===== */
    .wm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .wm-overlay.open { display: flex; }
    .wm-box {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .wm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #38b2ac;
      color: white;
    }
    .wm-header-title { font-weight: 700; font-size: 1rem; }
    .wm-header-info { font-size: 0.8rem; opacity: 0.9; }
    .wm-close {
      background: none; border: none; color: white;
      font-size: 1.3rem; cursor: pointer; padding: 4px 8px;
      border-radius: 6px;
    }
    .wm-close:hover { background: rgba(255,255,255,0.2); }
    .wm-board {
      display: flex;
      gap: 12px;
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    .wm-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wm-col > div:not(.wm-col-title) {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .wm-col-title {
      font-size: 0.75rem;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
      padding-bottom: 4px;
      border-bottom: 2px solid #e2e8f0;
    }
    .wm-tile {
      padding: 12px 10px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      text-align: center;
      transition: all 0.15s;
      user-select: none;
      line-height: 1.3;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .wm-tile:hover { border-color: #90cdf4; }
    .wm-tile.en { font-weight: 700; color: #2d3748; }
    .wm-tile.vi { color: #718096; font-style: italic; flex-direction: column; gap: 6px; }
    .wm-tile-img {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      object-fit: cover;
      display: none;
    }
    .wm-tile-img.loaded { display: block; }
    .wm-tile-text.hidden { display: none; }
    .wm-tile.selected {
      border-color: #4299e1;
      background: #ebf8ff;
      box-shadow: 0 0 0 2px rgba(66,153,225,0.3);
    }
    .wm-tile.matched {
      border-color: #48bb78;
      background: #f0fff4;
      color: #276749;
      cursor: default;
      opacity: 0.7;
    }
    .wm-tile.wrong {
      border-color: #fc8181;
      background: #fff5f5;
      animation: wmShake 0.4s;
    }
    @keyframes wmShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .wm-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-top: 1px solid #e2e8f0;
      background: #f7fafc;
    }
    .wm-score {
      font-size: 0.85rem;
      color: #718096;
    }
    .wm-score b { color: #276749; }
    .wm-timer {
      font-size: 0.85rem;
      color: #718096;
      font-family: 'Courier New', monospace;
    }
    .wm-done {
      padding: 32px 16px;
      text-align: center;
      display: none;
    }
    .wm-done.show { display: block; }
    .wm-done h2 { font-size: 1.3rem; color: #2d3748; margin-bottom: 8px; }
    .wm-done p { color: #718096; margin-bottom: 16px; font-size: 1rem; }
    .wm-done-btn {
      padding: 10px 24px;
      background: #38b2ac;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
    }
    .wm-done-btn:hover { background: #319795; }
    .wm-done-btn.secondary { background: #e2e8f0; color: #4a5568; }
    .wm-done-btn.secondary:hover { background: #cbd5e0; }

    /* ===== TOOLTIP ===== */
    #tooltip {
      position: fixed;
      background: #2d3748;
      color: white;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.4;
    }
    #tooltip.visible { opacity: 1; }

    @media (max-width: 480px) {
      body { padding: 10px; }
      h1 { font-size: 1.3rem; margin-bottom: 12px; }
      .tab-content { padding: 12px; }
      .tab-name-input { width: 65px; }
    }
  </style>
</head>
<body>

<div id="tooltip"></div>
<h1>📚 Từ Vựng Tiếng Anh <span style="font-size:0.5em;color:#a0aec0">v2.4</span></h1>

<div class="tabs-wrapper">
  <div class="tabs-nav">
    <button class="tabs-scroll-btn" id="scrollLeft" onclick="scrollTabs(-1)" data-tip="Cuộn tab sang trái">◀</button>
    <div class="tabs-bar" id="tabsBar"></div>
    <button class="tabs-scroll-btn" id="scrollRight" onclick="scrollTabs(1)" data-tip="Cuộn tab sang phải">▶</button>
    <button class="btn-new-tab" onclick="newTab()" data-tip="Tạo bài học mới">+</button>
  </div>
  <div class="tab-content">
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="wordInput" placeholder="Nhập hoặc tìm từ tiếng Anh..." autofocus autocomplete="off" />
        <div class="suggest-list" id="suggestList"></div>
      </div>
      <button class="btn-add" onclick="addWord()" data-tip="Thêm từ vào danh sách (Enter)">+ Thêm</button>
    </div>
    <div class="toolbar">
      <span class="count-label" id="countLabel">0 từ</span>
      <div class="toolbar-right">
        <button class="btn-quiz" onclick="startQuiz()" data-tip="Luyện tập flashcard từ vựng">🎴 Luyện tập</button>
        <button class="btn-match" onclick="startMatch()" data-tip="Ghép từ tiếng Anh với nghĩa tiếng Việt">🧩 Ghép từ</button>
        <button class="btn-speak-all" onclick="speakAll()" data-tip="Đọc lần lượt tất cả từ trong bài">▶ Đọc tất cả</button>
        <button class="btn-clear-all" onclick="clearAll()" data-tip="Xóa toàn bộ từ trong bài này">Xóa tất cả</button>
      </div>
    </div>
    <div class="vocab-list" id="vocabList"></div>
    <p class="empty-msg" id="emptyMsg">Chưa có từ nào. Thêm từ đầu tiên nhé! 👆</p>
    <div style="display:none;gap:6px;justify-content:center;margin-top:8px">
      <button class="voice-log-toggle" onclick="toggleVoiceLog()">🔍 Voice Log</button>
      <button class="voice-log-toggle" onclick="clearVoiceLog()">🗑 Xóa log</button>
      <button class="voice-log-toggle" onclick="testMicLevel()">🎚 Test Mic</button>
    </div>
    <div class="mic-meter-wrap" id="micMeter">
      <span>MIC</span>
      <div class="mic-meter-bar"><div class="mic-meter-fill" id="micMeterFill"></div></div>
      <span class="mic-meter-val" id="micMeterVal">0%</span>
    </div>
    <div class="voice-log" id="voiceLog"></div>
  </div>
</div>

<div class="fc-overlay" id="fcOverlay">
  <div class="fc-box">
    <div class="fc-header">
      <span class="fc-header-title">🎴 Luyện tập</span>
      <span class="fc-header-info" id="fcProgress">1/10</span>
      <button class="fc-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="fc-mode-bar">
      <button class="fc-mode-btn active" id="fcMode1" onclick="setQuizMode('vi2en')">🇻🇳 → EN</button>
      <button class="fc-mode-btn" id="fcMode2" onclick="setQuizMode('en2vi')">EN → 🇻🇳</button>
      <button class="fc-mode-btn" id="fcMode3" onclick="setQuizMode('listen')">🔊 Nghe viết</button>
    </div>
    <div class="fc-card" id="fcCard">
      <div class="fc-prompt" id="fcPrompt">Nghĩa tiếng Việt</div>
      <img class="fc-img" id="fcImg" alt="" />
      <div class="fc-question" id="fcQuestion"></div>
      <div class="fc-phonetic" id="fcPhonetic"></div>
    </div>
    <div class="fc-answer-area" id="fcAnswerArea">
      <input type="text" class="fc-input" id="fcInput" placeholder="Gõ câu trả lời..." autocomplete="off" />
      <button class="fc-mic-btn" id="fcMicBtn" onclick="fcStartListen()" data-tip="Nói câu trả lời">🎤</button>
      <button class="fc-check-btn" id="fcCheckBtn" onclick="checkQuizAnswer()">Kiểm tra</button>
    </div>
    <div class="fc-reveal" id="fcReveal">
      <div class="fc-reveal-word" id="fcRevealWord"></div>
      <div class="fc-reveal-phonetic" id="fcRevealPhonetic"></div>
      <div class="fc-reveal-meaning" id="fcRevealMeaning"></div>
    </div>
    <div class="fc-actions" id="fcActions" style="display:none">
      <button class="fc-btn fc-btn-audio" onclick="fcPlayAudio()">🔊 Nghe</button>
      <button class="fc-btn fc-btn-next" onclick="nextQuizCard()">Tiếp theo →</button>
    </div>
    <div class="fc-score" id="fcScore">
      <span>✓ Đúng: <span class="fc-score-ok" id="fcOk">0</span></span>
      <span>✗ Sai: <span class="fc-score-fail" id="fcFail">0</span></span>
    </div>
    <div class="fc-done" id="fcDone" style="display:none">
      <h2>🎉 Hoàn thành!</h2>
      <p id="fcDoneMsg"></p>
      <button class="fc-done-btn" onclick="startQuiz()">🔄 Làm lại</button>
      <button class="fc-done-btn secondary" onclick="closeQuiz()">Đóng</button>
    </div>
  </div>
</div>

<div class="wd-overlay" id="wdOverlay" onclick="wdOverlayClick(event)">
  <div class="wd-box" id="wdBox">
    <div class="wd-drag-bar"></div>
    <div class="wd-header">
      <button class="wd-close" onclick="closeWordDetail()">✕</button>
    </div>
    <div class="wd-img-wrap">
      <img class="wd-img" id="wdImg" alt="" />
    </div>
    <div class="wd-body">
      <div class="wd-word" id="wdWord"></div>
      <div class="wd-phonetic" id="wdPhonetic"></div>
      <div class="wd-meaning" id="wdMeaning"></div>
      <div class="wd-btns">
        <button class="wd-btn-speak" id="wdBtnSpeak" onclick="wdSpeak()">🔊 Nghe</button>
        <button class="wd-btn-mic" id="wdBtnMic" onclick="wdStartListen()">🎤 Nói</button>
      </div>
      <div class="wd-mic-result" id="wdMicResult"></div>
    </div>
    <audio id="wdAudio" preload="none"></audio>
  </div>
</div>

<div class="wm-overlay" id="wmOverlay">
  <div class="wm-box">
    <div class="wm-header">
      <span class="wm-header-title">🧩 Ghép từ</span>
      <span class="wm-header-info" id="wmHeaderInfo"></span>
      <button class="wm-close" onclick="closeMatch()">✕</button>
    </div>
    <div class="wm-board" id="wmBoard">
      <div class="wm-col">
        <div class="wm-col-title">English</div>
        <div id="wmColEn"></div>
      </div>
      <div class="wm-col">
        <div class="wm-col-title">Tiếng Việt</div>
        <div id="wmColVi"></div>
      </div>
    </div>
    <div class="wm-footer" id="wmFooter">
      <span class="wm-score" id="wmScore"></span>
      <span class="wm-timer" id="wmTimer">0:00</span>
    </div>
    <div class="wm-done" id="wmDone">
      <h2>🎉 Hoàn thành!</h2>
      <p id="wmDoneMsg"></p>
      <button class="wm-done-btn" onclick="startMatch()">🔄 Chơi lại</button>
      <button class="wm-done-btn secondary" onclick="closeMatch()">Đóng</button>
    </div>
  </div>
</div>

<script>
  // ===== DỮ LIỆU =====
  let tabs = JSON.parse(localStorage.getItem('vocab_tabs') || 'null');
  if (!tabs) {
    tabs = [{ id: 'tab_' + Date.now(), name: 'Bài 1' }];
    saveTabs();
  }
  let activeTabId = localStorage.getItem('vocab_active_tab') || tabs[0].id;
  if (!tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;

  function saveTabs() {
    localStorage.setItem('vocab_tabs', JSON.stringify(tabs));
  }

  function getWords(tabId) {
    return JSON.parse(localStorage.getItem('vocab_words_' + tabId) || '[]');
  }

  function setWords(tabId, words) {
    localStorage.setItem('vocab_words_' + tabId, JSON.stringify(words));
  }

  // ===== RENDER TABS =====
  function renderTabs() {
    const bar = document.getElementById('tabsBar');
    bar.innerHTML = '';

    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
      el.onclick = (e) => {
        if (e.target.classList.contains('tab-close')) return;
        if (e.target.classList.contains('tab-name-input') && !e.target.readOnly) return;
        switchTab(tab.id);
      };

      const nameInput = document.createElement('input');
      nameInput.className = 'tab-name-input';
      nameInput.value = tab.name;
      nameInput.readOnly = true;

      function startEdit() {
        nameInput.readOnly = false;
        nameInput.focus();
        nameInput.select();
      }

      nameInput.onblur = () => {
        nameInput.readOnly = true;
        tab.name = nameInput.value.trim() || tab.name;
        nameInput.value = tab.name;
        saveTabs();
        renderTabs();
      };
      nameInput.onkeydown = (e) => {
        if (e.key === 'Enter') nameInput.blur();
        e.stopPropagation();
      };

      const editBtn = document.createElement('span');
      editBtn.className = 'tab-edit';
      editBtn.textContent = '✏';
      editBtn.title = 'Đổi tên';
      editBtn.onclick = (e) => {
        e.stopPropagation();
        if (tab.id !== activeTabId) { switchTab(tab.id); setTimeout(startEdit, 60); return; }
        startEdit();
      };

      const closeBtn = document.createElement('span');
      closeBtn.className = 'tab-close';
      closeBtn.textContent = '✕';
      closeBtn.title = 'Xóa tab';
      closeBtn.onclick = () => deleteTab(tab.id);

      el.appendChild(nameInput);
      el.appendChild(editBtn);
      if (tabs.length > 1) el.appendChild(closeBtn);
      bar.appendChild(el);
    });

  }

  function switchTab(id) {
    activeTabId = id;
    localStorage.setItem('vocab_active_tab', id);
    renderTabs();
    renderWords();
    document.getElementById('wordInput').focus();
    setTimeout(() => { updateScrollBtns(); scrollActiveTabIntoView(); }, 50);
  }

  function newTab() {
    const id = 'tab_' + Date.now();
    tabs.push({ id, name: 'Bài ' + (tabs.length + 1) });
    saveTabs();
    switchTab(id);
  }

  function deleteTab(id) {
    if (!confirm('Xóa tab "' + tabs.find(t => t.id === id)?.name + '"?')) return;
    localStorage.removeItem('vocab_words_' + id);
    tabs = tabs.filter(t => t.id !== id);
    saveTabs();
    if (activeTabId === id) activeTabId = tabs[0].id;
    switchTab(activeTabId);
  }

  // ===== RENDER WORDS =====
  function renderWords() {
    const words = getWords(activeTabId);
    const list = document.getElementById('vocabList');
    const emptyMsg = document.getElementById('emptyMsg');
    const countLabel = document.getElementById('countLabel');

    list.innerHTML = '';
    countLabel.textContent = words.length + ' từ';

    if (words.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    for (const word of words) {
      const card = document.createElement('div');
      card.className = 'vocab-card';

      card.innerHTML = `
        <img class="word-img" id="wi-${word}" alt="" />
        <div class="word-info">
          <span class="word-text">${word}</span>
          <span class="word-phonetic" id="ph-${word}">...</span>
          <span class="word-meaning loading" id="mn-${word}">đang dịch...</span>
          <span class="mic-result" id="mr-${word}"></span>
        </div>
        <div class="word-actions">
          <button class="btn-speak" data-tip="Nghe Google đọc từ này">🔊</button>
          <button class="btn-mic" id="mb-${word}" onclick="startListen('${word}')" data-tip="Nhấn → nói từ → tự dừng khi bạn ngừng nói">🎤</button>
          <button class="btn-delete" onclick="deleteWord('${word}')" data-tip="Xóa từ này khỏi danh sách">✕</button>
        </div>
      `;

      // iOS: nút loa chính là <audio> element, user tap trực tiếp → play() hợp lệ
      const au = document.createElement('audio');
      au.preload = 'none';
      au.src = ttsUrl(word);
      au.dataset.word = word;
      card.querySelector('.word-actions').prepend(au);

      au.addEventListener('playing', () => vlog(`🔊 Audio playing: "${au.dataset.word}"`));
      au.addEventListener('error', () => vlog(`🔊 Audio error: "${au.dataset.word}" — ${au.error?.message || au.error?.code || 'unknown'}`, 'err'));
      au.addEventListener('ended', () => vlog(`🔊 Audio ended: "${au.dataset.word}"`));

      const speakBtn = card.querySelector('.btn-speak');
      speakBtn.addEventListener('click', () => {
        vlog(`🔊 Tap speak: "${word}"`);
        unlockAudio(); // Unlock shared audio trên iOS trước khi play
        au.currentTime = 0;
        au.play().catch(err => vlog(`🔊 play() rejected: ${err.message}`, 'err'));
      });

      card.addEventListener('click', (e) => {
        if (e.target.closest('button') || e.target.tagName === 'AUDIO') return;
        openWordDetail(word);
      });

      list.appendChild(card);

      translate(word).then(m => {
        const el = document.getElementById('mn-' + word);
        if (el) { el.textContent = m; el.className = 'word-meaning'; }
      });
      getPhonetic(word).then(p => {
        const el = document.getElementById('ph-' + word);
        if (el) el.textContent = p || '';
      });
      getWordImage(word).then(url => {
        if (!url) return;
        const el = document.getElementById('wi-' + word);
        if (el) { el.src = url; el.onload = () => el.classList.add('loaded'); }
      });
    }
  }

  // ===== ACTIONS =====
  function addWord() {
    const input = document.getElementById('wordInput');
    const word = input.value.trim();
    if (!word) return;
    const words = getWords(activeTabId);
    if (words.map(w => w.toLowerCase()).includes(word.toLowerCase())) {
      input.value = '';
      return;
    }
    words.push(word);
    setWords(activeTabId, words);
    input.value = '';
    renderWords();
    speak(word);
  }

  function deleteWord(word) {
    const words = getWords(activeTabId).filter(w => w !== word);
    setWords(activeTabId, words);
    renderWords();
  }

  function clearAll() {
    if (!confirm('Xóa hết từ vựng trong tab này?')) return;
    setWords(activeTabId, []);
    renderWords();
  }

  // ===== API =====
  async function translate(word) {
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(word)}`;
      const res = await fetch(url);
      const data = await res.json();
      return data[0].map(x => x[0]).join('');
    } catch { return ''; }
  }

  async function getPhonetic(word) {
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      const data = await res.json();
      return data[0]?.phonetic || data[0]?.phonetics?.find(p => p.text)?.text || '';
    } catch { return ''; }
  }

  // ===== WIKIPEDIA IMAGE =====
  async function getWordImage(word) {
    const cached = localStorage.getItem('img_' + word);
    if (cached !== null) return cached || '';
    try {
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(word)}`);
      if (!res.ok) { localStorage.setItem('img_' + word, ''); return ''; }
      const data = await res.json();
      const url = data.thumbnail?.source || '';
      localStorage.setItem('img_' + word, url);
      return url;
    } catch { localStorage.setItem('img_' + word, ''); return ''; }
  }

  // Shared audio — dùng cho speak(word) gọi programmatic & speakAll()
  // Trên iOS, sau khi user tap unlock 1 lần, element này có thể play() tự do
  const _sharedAudio = document.createElement('audio');
  _sharedAudio.preload = 'none';
  document.body.appendChild(_sharedAudio);

  function ttsUrl(word) {
    return `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word)}&tl=en&client=gtx`;
  }

  function unlockAudio() {
    _sharedAudio.play().then(() => _sharedAudio.pause()).catch(() => {});
  }

  function speak(word) {
    _sharedAudio.src = ttsUrl(word);
    _sharedAudio.play().catch(() => {});
  }

  // startSimpleRec: shared core cho mọi mic recognition đơn giản (fc, wd)
  // opts: { word, getRef, setRef, btnEl, resetText, onInterim, onFinal, onError, onDone }
  // Không gọi getCachedMicStream ở đây — SpeechRecognition tự quản lý mic,
  // gọi thêm getUserMedia chỉ làm browser hỏi quyền 2 lần.
  function startSimpleRec(opts) {
    const { word, getRef, setRef, btnEl, resetText = '🎤', onInterim, onFinal, onError, onDone } = opts;
    if (getRef()) { getRef().stop(); return; }
    if (!SpeechRecognition) { onError('no-support'); return; }
    _sharedAudio.pause(); _sharedAudio.currentTime = 0;
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = !!onInterim;
    rec.maxAlternatives = 5;
    setRef(rec);
    btnEl.classList.add('listening');
    btnEl.textContent = '⏹';
    rec.onresult = e => {
      const res0 = e.results[0];
      if (!res0.isFinal) { onInterim?.(res0[0].transcript); return; }
      onFinal(Array.from(res0).map(r => r.transcript.trim().toLowerCase()));
    };
    rec.onspeechend = () => rec.stop();
    rec.onerror = e => { if (e.error !== 'aborted') onError(e.error); };
    rec.onend = () => {
      btnEl.classList.remove('listening');
      btnEl.textContent = resetText;
      setRef(null);
      onDone?.();
    };
    rec.start();
  }

  function speakAll() {
    const words = getWords(activeTabId);
    if (!words.length) return;
    vlog(`▶▶ speakAll: ${words.length} từ`);
    let i = 0;
    function next() {
      if (i >= words.length) { vlog(`▶▶ speakAll hoàn tất`, 'ok'); return; }
      vlog(`▶▶ speakAll [${i+1}/${words.length}]: "${words[i]}"`);
      _sharedAudio.onended = () => { i++; setTimeout(next, 500); };
      _sharedAudio.onerror = () => { vlog(`▶▶ speakAll error tại "${words[i]}"`, 'err'); i++; setTimeout(next, 500); };
      _sharedAudio.src = ttsUrl(words[i]);
      _sharedAudio.play().catch(err => vlog(`▶▶ speakAll play() rejected: ${err.message}`, 'err'));
    }
    // Từ đầu tiên play() trong user gesture → unlock
    // Các từ tiếp theo dùng cùng element đã unlock → iOS cho phép
    next();
  }

  // ===== CACHED MIC STREAM (tránh hỏi Allow nhiều lần trên file://) =====
  let _cachedMicStream = null;
  const _audioConstraints = {
    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
  };
  function getCachedMicStream() {
    // Kiểm tra stream cũ còn sống không
    if (_cachedMicStream) {
      const tracks = _cachedMicStream.getAudioTracks();
      if (tracks.length > 0 && tracks[0].readyState === 'live') {
        return Promise.resolve(_cachedMicStream);
      }
      _cachedMicStream = null;
    }
    return navigator.mediaDevices.getUserMedia(_audioConstraints).then(stream => {
      _cachedMicStream = stream;
      return stream;
    });
  }

  // ===== TEST MIC LEVEL =====
  let _testMicCtx = null, _testMicAnimId = null, _testMicActive = false;
  function testMicLevel() {
    // Nếu đang test → dừng
    if (_testMicActive) {
      cancelAnimationFrame(_testMicAnimId);
      if (_testMicCtx) _testMicCtx.close().catch(() => {});
      _testMicCtx = null;
      _testMicActive = false;
      document.getElementById('micMeter').classList.remove('active');
      vlog(`🎚 Test mic dừng`);
      return;
    }
    vlog(`🎚 Bắt đầu test mic...`);
    getCachedMicStream().then(stream => {
      _testMicActive = true;
      const tracks = stream.getAudioTracks();
      vlog(`🎚 Đang dùng mic: "${tracks[0]?.label || 'unknown'}"`);
      const settings = tracks[0]?.getSettings?.() || {};
      vlog(`🎚 AGC=${settings.autoGainControl}, noise=${settings.noiseSuppression}, echo=${settings.echoCancellation}`);
      _testMicCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = _testMicCtx.createMediaStreamSource(stream);
      const analyser = _testMicCtx.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);
      const meterWrap = document.getElementById('micMeter');
      const meterFill = document.getElementById('micMeterFill');
      const meterVal = document.getElementById('micMeterVal');
      meterWrap.classList.add('active');
      const dataArr = new Uint8Array(analyser.frequencyBinCount);
      function update() {
        analyser.getByteTimeDomainData(dataArr);
        let sum = 0;
        for (let i = 0; i < dataArr.length; i++) {
          const v = (dataArr[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / dataArr.length);
        const pct = Math.min(100, Math.round(rms * 300));
        meterFill.style.width = pct + '%';
        meterFill.className = 'mic-meter-fill ' + (pct < 5 ? 'low' : pct < 20 ? 'mid' : 'high');
        meterVal.textContent = pct + '%';
        _testMicAnimId = requestAnimationFrame(update);
      }
      update();
      vlog(`🎚 Hãy nói gì đó để xem thanh level — nhấn Test Mic lần nữa để dừng`);
    }).catch(err => {
      vlog(`🎚 Mic error: ${err.message}`, 'err');
    });
  }

  // ===== SPEECH RECOGNITION =====
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let _activeRec = null;
  let _activeRecWord = null;

  function startListen(word) {
    if (!SpeechRecognition) {
      alert('Trình duyệt không hỗ trợ nhận diện giọng nói.');
      return;
    }

    // Nếu đang ghi âm cùng từ → dừng
    if (_activeRec && _activeRecWord === word) {
      _activeRec.stop();
      return;
    }

    // Nếu đang ghi âm từ khác → dừng cái cũ trước
    if (_activeRec) {
      _activeRec.onend = null;
      _activeRec.onerror = null;
      _activeRec.onresult = null;
      _activeRec.abort();
      const oldBtn = document.getElementById('mb-' + _activeRecWord);
      if (oldBtn) { oldBtn.classList.remove('listening'); oldBtn.textContent = '🎤'; }
      _activeRec = null;
      _activeRecWord = null;
    }

    // Dừng mọi audio đang phát để giải phóng mic trên iOS
    _sharedAudio.pause();
    _sharedAudio.currentTime = 0;
    document.querySelectorAll('.vocab-card audio').forEach(a => { a.pause(); a.currentTime = 0; });

    const btn = document.getElementById('mb-' + word);
    const result = document.getElementById('mr-' + word);

    // Mở mic — dùng cached stream (tránh hỏi Allow lại)
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      getCachedMicStream().then(stream => {
        const tracks = stream.getAudioTracks();
        const settings = tracks[0]?.getSettings?.() || {};
        vlog(`🎙 Mic OK: "${tracks[0]?.label || 'unknown'}"`, 'ok');
        vlog(`🎙 Settings: AGC=${settings.autoGainControl}, noise=${settings.noiseSuppression}, echo=${settings.echoCancellation}, sampleRate=${settings.sampleRate}`);
        // Giữ stream để monitor level trong lúc recognition
        doStartRec(word, btn, result, stream);
      }).catch(err => {
        vlog(`🎙 Mic permission DENIED: ${err.name} — ${err.message}`, 'err');
        result.className = 'mic-result wrong';
        result.textContent = '❌ Không truy cập được mic — kiểm tra quyền micro trong Cài đặt';
      });
    } else {
      vlog(`🎙 mediaDevices không có — skip mic check`);
      doStartRec(word, btn, result, null);
    }
  }

  function doStartRec(word, btn, result, micStream) {
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = true;
    rec.maxAlternatives = 5;

    // Mic level monitor — giống cách Google Translate kiểm tra mic
    let _micCtx = null, _micAnalyser = null, _micAnimId = null;
    if (micStream) {
      try {
        _micCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = _micCtx.createMediaStreamSource(micStream);
        _micAnalyser = _micCtx.createAnalyser();
        _micAnalyser.fftSize = 512;
        source.connect(_micAnalyser);
        // KHÔNG connect đến destination (không phát lại qua loa)
        const meterWrap = document.getElementById('micMeter');
        const meterFill = document.getElementById('micMeterFill');
        const meterVal = document.getElementById('micMeterVal');
        meterWrap.classList.add('active');
        let _peakLevel = 0;
        const dataArr = new Uint8Array(_micAnalyser.frequencyBinCount);
        function updateMeter() {
          _micAnalyser.getByteTimeDomainData(dataArr);
          let sum = 0;
          for (let i = 0; i < dataArr.length; i++) {
            const v = (dataArr[i] - 128) / 128;
            sum += v * v;
          }
          const rms = Math.sqrt(sum / dataArr.length);
          const pct = Math.min(100, Math.round(rms * 300));
          if (pct > _peakLevel) _peakLevel = pct;
          meterFill.style.width = pct + '%';
          meterFill.className = 'mic-meter-fill ' + (pct < 5 ? 'low' : pct < 20 ? 'mid' : 'high');
          meterVal.textContent = pct + '%';
          _micAnimId = requestAnimationFrame(updateMeter);
        }
        updateMeter();
        // Log khi dừng
        rec.addEventListener('end', () => {
          cancelAnimationFrame(_micAnimId);
          vlog(`🎚 Mic peak level: ${_peakLevel}% ${_peakLevel < 5 ? '⚠️ RẤT NHỎ — mic có thể bị mute hoặc sai thiết bị!' : _peakLevel < 15 ? '⚠️ Nhỏ — thử nói to hơn hoặc lại gần mic' : '✓ OK'}`, _peakLevel < 5 ? 'err' : _peakLevel < 15 ? 'err' : 'ok');
          meterWrap.classList.remove('active');
          // KHÔNG stop stream tracks — giữ lại để dùng lần sau (tránh hỏi Allow lại)
          _micCtx.close().catch(() => {});
        });
      } catch (e) {
        vlog(`🎚 Mic meter error: ${e.message}`, 'err');
      }
    }

    _activeRec = rec;
    _activeRecWord = word;

    // Diagnostic flags
    let _startTime = Date.now();
    let _audioStartTime = 0;
    let _gotSound = false;
    let _gotSpeech = false;
    let _gotResult = false;
    let _gotError = false;
    let _interimCount = 0;

    btn.classList.add('listening');
    btn.textContent = '⏹';
    result.className = 'mic-result info';
    result.textContent = '🎙 Hãy nói "' + word + '" — tự dừng khi bạn ngừng nói';
    vlog(`▶ Bắt đầu nghe "${word}" (lang=${rec.lang}, maxAlt=${rec.maxAlternatives}, interim=${rec.interimResults})`);

    rec.onaudiostart = () => {
      _audioStartTime = Date.now();
      vlog(`🎙 audiostart — mic đã mở (+${_audioStartTime - _startTime}ms)`);
    };
    rec.onsoundstart = () => { _gotSound = true; vlog(`🎙 soundstart — phát hiện âm thanh (+${Date.now() - _startTime}ms)`); };
    rec.onspeechstart = () => { _gotSpeech = true; vlog(`🎙 speechstart — phát hiện giọng nói (+${Date.now() - _startTime}ms)`); };
    rec.onspeechend = () => {
      vlog(`🎙 speechend — ngừng nói (+${Date.now() - _startTime}ms), gọi rec.stop() để thúc trả result`);
      rec.stop();
    };
    rec.onsoundend = () => vlog(`🎙 soundend — hết âm thanh (+${Date.now() - _startTime}ms)`);
    rec.onaudioend = () => {
      const micDuration = _audioStartTime ? Date.now() - _audioStartTime : 0;
      vlog(`🎙 audioend — mic đã đóng (mic mở ${micDuration}ms, +${Date.now() - _startTime}ms)`);
    };
    rec.onnomatch = () => vlog(`🎙 nomatch — không khớp kết quả nào`, 'err');

    rec.onresult = (e) => {
      const res0 = e.results[0];
      const isFinal = res0.isFinal;
      if (!isFinal) {
        _interimCount++;
        const interim = res0[0].transcript;
        vlog(`📝 interim #${_interimCount}: "${interim}" (+${Date.now() - _startTime}ms)`);
        return;
      }
      _gotResult = true;
      const clean = s => s.trim().toLowerCase().replace(/[.,!?;:'"()]/g, '').trim();
      const alts = Array.from(res0).map(r => ({ text: r.transcript.trim().toLowerCase(), conf: r.confidence }));
      const matched = alts.some(a => clean(a.text) === clean(word));
      result.className = 'mic-result ' + (matched ? 'correct' : 'wrong');
      result.textContent = matched ? `✓ Chính xác! Google nhận ra: "${alts[0].text}"` : `✗ Chưa đúng — Google nghe: "${alts[0].text}"`;
      const altStr = alts.map(a => `"${a.text}" (${(a.conf*100).toFixed(1)}%)`).join(', ');
      vlog(`📝 FINAL result (+${Date.now() - _startTime}ms): [${altStr}] → ${matched ? 'ĐÚNG ✓' : 'SAI ✗'}`, matched ? 'ok' : 'err');
    };

    rec.onerror = (e) => {
      _gotError = true;
      vlog(`❌ Lỗi: ${e.error} | message: ${e.message || '(none)'} (+${Date.now() - _startTime}ms)`, 'err');
      if (e.error === 'aborted') return;
      result.className = 'mic-result wrong';
      result.textContent = e.error === 'no-speech' ? '🔇 Không nghe thấy gì — hãy thử lại' : 'Lỗi: ' + e.error;
    };

    rec.onend = () => {
      const totalMs = Date.now() - _startTime;
      const micMs = _audioStartTime ? Date.now() - _audioStartTime : 0;
      vlog(`⏹ Kết thúc nghe "${word}" (tổng ${totalMs}ms, mic ${micMs}ms)`);
      // Diagnostic summary
      if (!_gotResult && !_gotError) {
        vlog(`⚠️ CẢNH BÁO: Kết thúc KHÔNG có result & KHÔNG có error!`, 'err');
        vlog(`   → sound=${_gotSound}, speech=${_gotSpeech}, interim=${_interimCount}`, 'err');
        if (!_gotSound) vlog(`   → Mic mở nhưng KHÔNG phát hiện âm thanh — kiểm tra mic permission hoặc mic bị mute`, 'err');
        else if (!_gotSpeech) vlog(`   → Có âm thanh nhưng KHÔNG nhận dạng giọng nói — nói to/rõ hơn`, 'err');
        else vlog(`   → Có giọng nói nhưng Google không trả result — có thể mạng chậm/timeout`, 'err');
      } else if (!_gotResult && _gotError) {
        vlog(`   → Kết thúc với lỗi, không có result`);
      }
      btn.classList.remove('listening');
      btn.textContent = '🎤';
      if (_activeRec === rec) {
        _activeRec = null;
        _activeRecWord = null;
      }
    };

    try {
      rec.start();
      vlog(`🎙 rec.start() called OK (+${Date.now() - _startTime}ms)`);
    } catch(err) {
      vlog(`🎙 rec.start() exception: ${err.message}`, 'err');
    }
  }

  // ===== TÌM KIẾM / SUGGEST =====
  let focusedSuggest = -1;

  function highlight(text, query) {
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx < 0) return `<span>${text}</span>`;
    return `<span>${text.slice(0, idx)}<mark>${text.slice(idx, idx + query.length)}</mark>${text.slice(idx + query.length)}</span>`;
  }

  let suggestTimer = null;

  async function renderSuggest(query) {
    const box = document.getElementById('suggestList');
    focusedSuggest = -1;
    if (!query) { box.style.display = 'none'; return; }

    const existing = getWords(activeTabId);
    const existMatches = existing.filter(w => w.toLowerCase().includes(query.toLowerCase()));

    // Hiện ngay phần từ đã có
    let html = '';
    if (existMatches.length) {
      html += existMatches.slice(0, 4).map(w => {
        const meaning = localStorage.getItem('meaning_' + w) || '';
        return `<div class="suggest-item" data-word="${w}" onmousedown="selectSuggest('${w}')">
          <span class="s-word">${highlight(w, query)}</span>
          ${meaning ? `<span class="s-meaning">${meaning}</span>` : ''}
          <span class="s-badge">Đã có ↑</span>
        </div>`;
      }).join('');
    }

    box.innerHTML = html || '<div class="suggest-divider">Đang tìm gợi ý...</div>';
    box.style.display = 'block';

    // Debounce gợi ý từ mới
    clearTimeout(suggestTimer);
    suggestTimer = setTimeout(async () => {
      try {
        const res = await fetch(`https://api.datamuse.com/words?sp=${encodeURIComponent(query)}*&max=6`);
        const data = await res.json();
        const existSet = new Set(existing.map(w => w.toLowerCase()));
        const newWords = data.map(d => d.word).filter(w => !existSet.has(w.toLowerCase()));

        let newHtml = existMatches.length
          ? existMatches.slice(0, 4).map(w => {
              const meaning = localStorage.getItem('meaning_' + w) || '';
              return `<div class="suggest-item" data-word="${w}" onmousedown="selectSuggest('${w}')">
                <span class="s-word">${highlight(w, query)}</span>
                ${meaning ? `<span class="s-meaning">${meaning}</span>` : ''}
                <span class="s-badge">Đã có ↑</span>
              </div>`;
            }).join('')
          : '';

        if (newWords.length) {
          newHtml += `<div class="suggest-divider">Gợi ý từ mới</div>`;
          newHtml += newWords.slice(0, 4).map(w =>
            `<div class="suggest-item" data-word="${w}" onmousedown="selectSuggest('${w}', true)">
              <span class="s-word">${highlight(w, query)}</span>
              <span class="s-badge new">+ Thêm</span>
            </div>`
          ).join('');
        }

        if (newHtml) {
          box.innerHTML = newHtml;
          box.style.display = 'block';
        } else {
          box.style.display = 'none';
        }
      } catch {
        if (!existMatches.length) box.style.display = 'none';
      }
    }, 300);
  }

  function selectSuggest(word, isNew = false) {
    const words = getWords(activeTabId).filter(w => w !== word);
    if (isNew) {
      words.unshift(word); // thêm từ mới vào đầu
    } else {
      words.unshift(word); // đẩy từ đã có lên đầu

    setWords(activeTabId, words);
    document.getElementById('wordInput').value = '';
    document.getElementById('suggestList').style.display = 'none';
    renderWords();
    speak(word);
    setTimeout(() => { document.getElementById('vocabList').scrollTop = 0; }, 50);
  }

  // ===== FLASHCARD QUIZ =====
  let _fcWords = [];
  let _fcIndex = 0;
  let _fcOk = 0;
  let _fcFail = 0;
  let _fcMode = 'vi2en';
  let _fcAnswered = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {

    _fcFail = 0;

    document.getElementById('fcDone').style.display = 'none';
    document.getElementById('fcCard').style.display = '';
    document.getElementById('fcAnswerArea').style.display = '';

  function showQuizCard() {
    if (_fcIndex >= _fcWords.length) { showQuizDone(); return; }
    const word = _fcWords[_fcIndex];
    const meaning = localStorage.getItem('meaning_' + word) || '';
    const phonetic = localStorage.getItem('phonetic_' + word) || '';
    const prompt = document.getElementById('fcPrompt');
    const question = document.getElementById('fcQuestion');
    const phEl = document.getElementById('fcPhonetic');
    const input = document.getElementById('fcInput');
    const reveal = document.getElementById('fcReveal');
    const actions = document.getElementById('fcActions');
    const checkBtn = document.getElementById('fcCheckBtn');

    reveal.classList.remove('show');
    actions.style.display = 'none';
    document.getElementById('fcAnswerArea').style.display = '';

    document.getElementById('fcMicBtn').style.display = (_fcMode === 'en2vi') ? 'none' : '';
    input.value = '';

    if (_fcRec) { _fcRec.abort(); _fcRec = null; }
    document.getElementById('fcMicBtn').classList.remove('listening');
    document.getElementById('fcMicBtn').textContent = '🎤';

    document.getElementById('fcProgress').textContent = (_fcIndex + 1) + '/' + _fcWords.length;

    // Show image
    const fcImg = document.getElementById('fcImg');
    fcImg.classList.remove('loaded');
    fcImg.src = '';
    getWordImage(word).then(url => {
      if (url && _fcWords[_fcIndex] === word) {
        fcImg.src = url;
        fcImg.onload = () => fcImg.classList.add('loaded');
      }
    });

    if (_fcMode === 'vi2en') {
      prompt.textContent = 'Nghĩa tiếng Việt';
      question.textContent = meaning || '(chưa có nghĩa)';
      question.className = 'fc-question vi';
      phEl.textContent = '';
      input.placeholder = 'Gõ từ tiếng Anh...';
    } else if (_fcMode === 'en2vi') {
      prompt.textContent = 'Từ tiếng Anh';
      question.textContent = word;
      question.className = 'fc-question';
      phEl.textContent = phonetic;
      input.placeholder = 'Gõ nghĩa tiếng Việt...';
    } else {
      prompt.textContent = '🔊 Nghe và viết lại';
      question.textContent = '🎧';
      question.className = 'fc-question';
      phEl.textContent = '';
      input.placeholder = 'Gõ từ bạn nghe được...';
      setTimeout(() => fcPlayAudio(), 300);
    }

    setTimeout(() => input.focus(), 100);
  }

  function checkQuizAnswer() {
    if (_fcAnswered) { nextQuizCard(); return; }
    const word = _fcWords[_fcIndex];
    const meaning = localStorage.getItem('meaning_' + word) || '';
    const input = document.getElementById('fcInput');
    const answer = input.value.trim();
    if (!answer) return;

    _fcAnswered = true;
    const clean = s => s.trim().toLowerCase().replace(/[.,!?;:'"()]/g, '').trim();
    let isCorrect;

    if (_fcMode === 'vi2en' || _fcMode === 'listen') {
      isCorrect = clean(answer) === clean(word);
    } else {
      isCorrect = clean(answer) === clean(meaning);
    }

    if (isCorrect) {
      _fcOk++;
      input.className = 'fc-input correct';
    } else {
      _fcFail++;
      input.className = 'fc-input wrong';
    }
    input.disabled = true;
    updateFcScore();

    const phonetic = localStorage.getItem('phonetic_' + word) || '';
    document.getElementById('fcRevealWord').textContent = word;
    document.getElementById('fcRevealPhonetic').textContent = phonetic;
    document.getElementById('fcRevealMeaning').textContent = meaning;
    document.getElementById('fcReveal').classList.add('show');
    document.getElementById('fcActions').style.display = '';
    document.getElementById('fcCheckBtn').style.display = 'none';
  }

  function nextQuizCard() {
    _fcIndex++;
    showQuizCard();
  }

  function fcPlayAudio() {
    if (_fcIndex >= _fcWords.length) return;
    speak(_fcWords[_fcIndex]);
  }

  function updateFcScore() {
    document.getElementById('fcOk').textContent = _fcOk;
    document.getElementById('fcFail').textContent = _fcFail;
  }

  function showQuizDone() {
    document.getElementById('fcCard').style.display = 'none';
    document.getElementById('fcAnswerArea').style.display = 'none';
    document.getElementById('fcActions').style.display = 'none';
    document.getElementById('fcReveal').classList.remove('show');
    const total = _fcOk + _fcFail;
    const pct = total ? Math.round(_fcOk / total * 100) : 0;
    document.getElementById('fcDoneMsg').textContent = `Đúng ${_fcOk}/${total} (${pct}%)`;
    document.getElementById('fcDone').style.display = '';
  }

  // Cache phonetic for flashcard
  const origGetPhonetic = getPhonetic;
  getPhonetic = async (word) => {
    const result = await origGetPhonetic(word);
    if (result) localStorage.setItem('phonetic_' + word, result);
    return result;
  };

  // ===== FLASHCARD MIC (Speech Recognition) =====
  let _fcRec = null;
  function fcStartListen() {
    if (_fcAnswered) return;
    const input = document.getElementById('fcInput');
    input.placeholder = '🎙 Đang nghe...';
    startSimpleRec({
      word: _fcWords[_fcIndex],
      getRef: () => _fcRec,
      setRef: r => _fcRec = r,
      btnEl: document.getElementById('fcMicBtn'),
      onInterim: t => { input.value = t; },
      onFinal: alts => { input.value = alts[0]; setTimeout(() => checkQuizAnswer(), 200); },
      onError: err => {
        if (err === 'no-support') { alert('Trình duyệt không hỗ trợ nhận diện giọng nói.'); return; }
        input.placeholder = err === 'no-speech' ? '🔇 Không nghe thấy — thử lại' : 'Lỗi: ' + err;
      },
      onDone: () => { if (!input.value) input.placeholder = 'Gõ câu trả lời...'; },
    });
  }

  // Flashcard input Enter key
  document.getElementById('fcInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (_fcAnswered) nextQuizCard();
      else checkQuizAnswer();
    }
  });

  // Close overlay on background click
  document.getElementById('fcOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeQuiz();
  });

  // ===== WORD MATCH GAME =====
  let _wmPairs = [];
  let _wmSelected = null;
  let _wmMatched = 0;
  let _wmAttempts = 0;
  let _wmTimerInterval = null;
  let _wmSeconds = 0;

  function startMatch() {
    const words = getWords(activeTabId);
    if (words.length < 3) { alert('Cần ít nhất 3 từ để chơi ghép từ!'); return; }
    // Pick up to 8 words that have meanings cached
    const pool = words.filter(w => localStorage.getItem('meaning_' + w));
    if (pool.length < 3) { alert('Chưa đủ nghĩa — hãy mở danh sách từ để tải nghĩa trước!'); return; }
    const picked = shuffle(pool).slice(0, 8);
    _wmPairs = picked.map(w => ({ en: w, vi: localStorage.getItem('meaning_' + w) }));
    _wmSelected = null;
    _wmMatched = 0;
    _wmAttempts = 0;
    _wmSeconds = 0;

    document.getElementById('wmOverlay').classList.add('open');
    document.getElementById('wmDone').classList.remove('show');
    document.getElementById('wmBoard').style.display = '';
    document.getElementById('wmFooter').style.display = '';
    renderMatchBoard();
    updateWmScore();

    clearInterval(_wmTimerInterval);
    document.getElementById('wmTimer').textContent = '0:00';
    _wmTimerInterval = setInterval(() => {
      _wmSeconds++;
      const m = Math.floor(_wmSeconds / 60);
      const s = _wmSeconds % 60;
      document.getElementById('wmTimer').textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);
  }

  function closeMatch() {
    document.getElementById('wmOverlay').classList.remove('open');
    clearInterval(_wmTimerInterval);
  }

  // ===== WORD DETAIL POPUP =====
  let _wdWord = null;
  let _wdRecog = null;

  function openWordDetail(word) {
    _wdWord = word;
    const overlay = document.getElementById('wdOverlay');
    document.getElementById('wdWord').textContent = word;
    document.getElementById('wdPhonetic').textContent = '';
    document.getElementById('wdMeaning').textContent = 'đang dịch...';
    document.getElementById('wdMicResult').className = 'wd-mic-result';
    document.getElementById('wdBtnMic').className = 'wd-btn-mic';
    document.getElementById('wdBtnMic').textContent = '🎤 Nói';
    const img = document.getElementById('wdImg');
    img.className = 'wd-img';
    img.src = '';
    const audio = document.getElementById('wdAudio');
    audio.src = ttsUrl(word);

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    // Lấy data từ cache (đã render ở card) hoặc fetch mới
    const phEl = document.getElementById('ph-' + word);
    const mnEl = document.getElementById('mn-' + word);
    const imgEl = document.getElementById('wi-' + word);
    if (phEl && phEl.textContent && phEl.textContent !== '...') {
      document.getElementById('wdPhonetic').textContent = phEl.textContent;
    } else {
      getPhonetic(word).then(p => { document.getElementById('wdPhonetic').textContent = p || ''; });
    }
    if (mnEl && mnEl.textContent && mnEl.textContent !== 'đang dịch...') {
      document.getElementById('wdMeaning').textContent = mnEl.textContent;
    } else {
      translate(word).then(m => { document.getElementById('wdMeaning').textContent = m; });
    }
    if (imgEl && imgEl.classList.contains('loaded')) {
      img.src = imgEl.src;
      img.onload = () => img.classList.add('loaded');
    } else {
      getWordImage(word).then(url => {
        if (!url) return;
        img.src = url;
        img.onload = () => img.classList.add('loaded');
      });
    }
  }

  function closeWordDetail() {
    document.getElementById('wdOverlay').classList.remove('open');
    document.body.style.overflow = '';
    if (_wdRecog) { try { _wdRecog.stop(); } catch(e) {} _wdRecog = null; }
    document.getElementById('wdAudio').pause();
  }

  function wdOverlayClick(e) {
    if (e.target === document.getElementById('wdOverlay')) closeWordDetail();
  }

  function wdSpeak() {
    unlockAudio(); // iOS unlock
    const audio = document.getElementById('wdAudio');
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }

  function wdStartListen() {
    const resEl = document.getElementById('wdMicResult');
    startSimpleRec({
      word: _wdWord,
      getRef: () => _wdRecog,
      setRef: r => { _wdRecog = r; },
      btnEl: document.getElementById('wdBtnMic'),
      resetText: '🎤 Nói',
      onFinal: alts => {
        const clean = s => s.replace(/[^a-z]/g, '');
        const target = _wdWord.toLowerCase();
        const ok = alts.some(a => a === target || clean(a) === clean(target));
        resEl.textContent = ok ? `✓ Đúng! "${alts[0]}"` : `✗ Nghe được: "${alts[0]}"`;
        resEl.className = 'wd-mic-result ' + (ok ? 'correct' : 'wrong');
      },
      onError: err => {
        if (err === 'no-support') {
          resEl.textContent = 'Trình duyệt không hỗ trợ mic';
          resEl.className = 'wd-mic-result wrong';
          return;
        }
        resEl.textContent = err === 'no-speech' ? '🔇 Không nghe thấy — thử lại' : 'Lỗi: ' + err;
        resEl.className = 'wd-mic-result wrong';
      },
    });
  }

  // Đóng popup bằng nút Back trên mobile
  window.addEventListener('popstate', () => {
    if (document.getElementById('wdOverlay').classList.contains('open')) closeWordDetail();
  });

  function renderMatchBoard() {
    const colEn = document.getElementById('wmColEn');
    const colVi = document.getElementById('wmColVi');
    colEn.innerHTML = '';
    colVi.innerHTML = '';
    document.getElementById('wmHeaderInfo').textContent = _wmPairs.length + ' cặp';

    const enOrder = shuffle([..._wmPairs]);
    const viOrder = shuffle([..._wmPairs]);

    enOrder.forEach(pair => {
      const tile = document.createElement('div');
      tile.className = 'wm-tile en';
      tile.textContent = pair.en;
      tile.dataset.word = pair.en;
      tile.onclick = () => wmSelectTile(tile, 'en');
      colEn.appendChild(tile);
    });

    viOrder.forEach(pair => {
      const tile = document.createElement('div');
      tile.className = 'wm-tile vi';
      const imgUrl = localStorage.getItem('img_' + pair.en);
      const hasImg = !!imgUrl;
      if (hasImg) {
        const img = document.createElement('img');
        img.className = 'wm-tile-img';
        img.src = imgUrl;
        img.onload = () => img.classList.add('loaded');
        tile.appendChild(img);
      }
      const txt = document.createElement('span');
      txt.textContent = pair.vi;
      txt.className = hasImg ? 'wm-tile-text hidden' : 'wm-tile-text';
      tile.appendChild(txt);
      tile.dataset.word = pair.en;
      if (hasImg) tile.setAttribute('data-tip', pair.vi);
      tile.onclick = () => wmSelectTile(tile, 'vi');
      colVi.appendChild(tile);
    });
  }

  function wmSelectTile(tile, side) {
    if (tile.classList.contains('matched')) return;

    // Remove previous wrong state
    document.querySelectorAll('.wm-tile.wrong').forEach(t => t.classList.remove('wrong'));

    if (!_wmSelected) {
      // First selection
      _wmSelected = { tile, side, word: tile.dataset.word };
      tile.classList.add('selected');
      return;
    }

    // Clicked same side → switch selection
    if (_wmSelected.side === side) {
      _wmSelected.tile.classList.remove('selected');
      _wmSelected = { tile, side, word: tile.dataset.word };
      tile.classList.add('selected');
      return;
    }

    // Different side → check match
    _wmAttempts++;
    const enWord = side === 'en' ? tile.dataset.word : _wmSelected.word;
    const viWord = side === 'vi' ? tile.dataset.word : _wmSelected.word;

    if (enWord === viWord) {
      // Correct match!
      tile.classList.add('matched');
      tile.classList.remove('selected');
      _wmSelected.tile.classList.add('matched');
      _wmSelected.tile.classList.remove('selected');
      _wmMatched++;
      _wmSelected = null;
      updateWmScore();

      // Play audio for matched word
      speak(enWord);

      if (_wmMatched >= _wmPairs.length) {
        clearInterval(_wmTimerInterval);
        setTimeout(showMatchDone, 600);
      }
    } else {
      // Wrong match
      tile.classList.add('wrong');
      _wmSelected.tile.classList.add('wrong');
      _wmSelected.tile.classList.remove('selected');
      _wmSelected = null;
      updateWmScore();
    }
  }

  function updateWmScore() {
    document.getElementById('wmScore').innerHTML = `<b>${_wmMatched}</b>/${_wmPairs.length} cặp · ${_wmAttempts} lần thử`;
  }

  function showMatchDone() {
    document.getElementById('wmBoard').style.display = 'none';
    document.getElementById('wmFooter').style.display = 'none';
    const m = Math.floor(_wmSeconds / 60);
    const s = _wmSeconds % 60;
    const time = m + ':' + String(s).padStart(2, '0');
    document.getElementById('wmDoneMsg').textContent = `Ghép ${_wmPairs.length} cặp trong ${time} với ${_wmAttempts} lần thử`;
    document.getElementById('wmDone').classList.add('show');
  }

  // Close overlay on background click
  document.getElementById('wmOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeMatch();
  });

  // ===== KHỞI TẠO =====
  const wordInput = document.getElementById('wordInput');

  wordInput.addEventListener('input', () => {
    renderSuggest(wordInput.value.trim());
  });

  wordInput.addEventListener('keydown', e => {
    const box = document.getElementById('suggestList');
    const items = box.querySelectorAll('.suggest-item');

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      focusedSuggest = Math.min(focusedSuggest + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusedSuggest));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      focusedSuggest = Math.max(focusedSuggest - 1, -1);
      items.forEach((el, i) => el.classList.toggle('focused', i === focusedSuggest));
    } else if (e.key === 'Enter') {
      if (focusedSuggest >= 0 && items[focusedSuggest]) {
        selectSuggest(items[focusedSuggest].dataset.word);
      } else {
        closeSuggest();
        addWord();
      }
    } else if (e.key === 'Escape') {
      closeSuggest();
    }
  });

  wordInput.addEventListener('blur', () => setTimeout(closeSuggest, 150));

  // ===== TOOLTIP (fixed-position, không bị clip bởi overflow) =====
  const _tip = document.getElementById('tooltip');
  let _tipTimer = null;

  function showTip(el) {
    const text = el.getAttribute('data-tip');
    if (!text) return;
    _tip.textContent = text;
    const r = el.getBoundingClientRect();
    _tip.style.left = '-9999px';
    _tip.style.top = '-9999px';
    _tip.classList.add('visible');
    const tw = _tip.offsetWidth;
    const th = _tip.offsetHeight;
    let x = r.left + r.width / 2 - tw / 2;
    let y = r.top - th - 8;
    if (y < 4) y = r.bottom + 8; // flip xuống nếu không đủ chỗ
    x = Math.max(4, Math.min(x, window.innerWidth - tw - 4));
    _tip.style.left = x + 'px';
    _tip.style.top = y + 'px';
  }

  function hideTip() {
    _tip.classList.remove('visible');
  }

  // Desktop: hover
  document.addEventListener('mouseover', (e) => {
    const el = e.target.closest('[data-tip]');
    if (el) showTip(el); else hideTip();
  });
  document.addEventListener('mouseout', (e) => {
    if (!e.relatedTarget?.closest('[data-tip]')) hideTip();
  });

  // Mobile: tap
  document.addEventListener('touchstart', (e) => {
    const el = e.target.closest('[data-tip]');
    hideTip();
    clearTimeout(_tipTimer);
    if (el) {
      showTip(el);
      _tipTimer = setTimeout(hideTip, 2000);
    }
  }, { passive: true });

  document.getElementById('tabsBar').addEventListener('scroll', updateScrollBtns);
  window.addEventListener('resize', updateScrollBtns);

  // Swipe-down để đóng word detail popup trên mobile
  (function() {
    const box = document.getElementById('wdBox');
    let startY = 0, isDragging = false;
    box.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      isDragging = true;
      box.style.transition = 'none';
    }, { passive: true });
    box.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 0) box.style.transform = `translateY(${dy}px)`;
    }, { passive: true });
    box.addEventListener('touchend', e => {
      if (!isDragging) return;
      isDragging = false;
      const dy = e.changedTouches[0].clientY - startY;
      box.style.transition = '';
      box.style.transform = '';
      if (dy > 80) closeWordDetail();
    });
  })();

  renderTabs();
  renderWords();
  setTimeout(() => { updateScrollBtns(); scrollActiveTabIntoView(); }, 50);
</script>

</body>
</html>
